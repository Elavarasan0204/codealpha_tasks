<!DOCTYPE html>
<html>
<head>
    <title>Smart AI Chatbot</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #f8fafc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 620px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #2563eb;
            color: white;
            text-align: center;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
        }

        #chatbox {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f8fafc;
        }

        .user-message {
            background: #2563eb;
            color: white;
            padding: 10px 14px;
            border-radius: 15px 15px 0 15px;
            margin: 8px 0;
            max-width: 75%;
            margin-left: auto;
            width: fit-content;
        }

        .bot-message {
            background: #e5e7eb;
            color: black;
            padding: 10px 14px;
            border-radius: 15px 15px 15px 0;
            margin: 8px 0;
            max-width: 75%;
            width: fit-content;
        }

        .input-area {
            display: flex;
            padding: 14px;
            border-top: 1px solid #ddd;
            background: white;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
        }

        button {
            margin-left: 10px;
            padding: 12px 18px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Smart AI Chatbot</div>

    <div id="chatbox">
        <div class="bot-message">Hello! How can I help you today?</div>
    </div>

    <div class="input-area">
        <input id="message" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    let input = document.getElementById("message");
    let message = input.value.trim();

    if (!message) return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user-message">${message}</div>`;

    let response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    });

    let data = await response.json();

    chatbox.innerHTML += `<div class="bot-message">${data.response}</div>`;
    chatbox.scrollTop = chatbox.scrollHeight;
    input.value = "";
}
</script>

</body>
</html>
